<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bedankt! | Tersagoesting</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="images/logo-tersagoesting.png" type="image/png">
    <style>
        .bedankt-page {
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }
        .bedankt-content {
            max-width: 600px;
        }
        .bedankt-content h1 {
            font-family: 'Cheboyga', serif;
            color: var(--terracotta);
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }
        .bedankt-content p {
            font-size: 1.1rem;
            line-height: 1.7;
            margin-bottom: 1.5rem;
        }
        .bedankt-content .btn {
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container header-inner">
            <a href="index.html" class="logo">
                <img src="images/logo-tersagoesting.png" alt="Tersagoesting logo">
            </a>
        </div>
    </header>

    <main>
        <section class="bedankt-page">
            <div class="bedankt-content">
                <img src="images/Tersagoesting_sublogo_oranje.png" alt="" style="width: 120px; margin-bottom: 1.5rem;">
                <h1>Bedankt voor je aanvraag!</h1>
                <p>We hebben je bericht goed ontvangen en nemen zo snel mogelijk contact met je op. Je ontvangt eerst een vrijblijvende offerte op maat.</p>
                <a href="index.html" class="btn btn-primary">Terug naar de website</a>
            </div>
        </section>
    </main>
</body>
</html>
